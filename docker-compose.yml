services:
  app:
    image: node:20-bookworm
    working_dir: /app
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/budget_tracker
      PORT: 4100
      VITE_API_URL: http://localhost:4100/api
    ports:
      - "4100:4100"
      - "5173:5173"
    volumes:
      - .:/app
      - budget_node_modules:/app/node_modules
      - budget_npm_cache:/root/.npm
    command: sh -c "npm install && npm run migrate && npm run dev"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: budget_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - budget_postgres:/var/lib/postgresql/data

volumes:
  budget_postgres:
  budget_node_modules:
  budget_npm_cache:
